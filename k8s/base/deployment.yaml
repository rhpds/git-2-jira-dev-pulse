apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse
  labels:
    app: devpulse
    app.kubernetes.io/name: devpulse
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: devpulse
  template:
    metadata:
      labels:
        app: devpulse
    spec:
      serviceAccountName: devpulse
      containers:
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account=devpulse
            - --upstream=http://localhost:9000
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret=AUTO
            - --pass-user-headers=true
            - --pass-access-token=false
          ports:
            - containerPort: 8443
              protocol: TCP
              name: proxy
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: devpulse
          image: image-registry.openshift-image-registry.svc:5000/devpulse-dev/devpulse:latest
          ports:
            - containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: devpulse-config
            - secretRef:
                name: devpulse-secrets
          volumeMounts:
            - name: data
              mountPath: /home/devpulse/.git2jira
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: devpulse-data
        - name: proxy-tls
          secret:
            secretName: devpulse-proxy-tls

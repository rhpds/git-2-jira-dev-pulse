apiVersion: v1
kind: ConfigMap
metadata:
  name: devpulse-config
  labels:
    app: devpulse
data:
  JIRA_URL: "https://redhat.atlassian.net"
  JIRA_EMAIL: "slack-google-jira@redhat.com"
  JIRA_DEFAULT_PROJECT: "RHDPOPS"
  DB_PATH: "/home/devpulse/.git2jira/devpulse.db"
  REPOS_BASE_PATH: "/home/devpulse/repos"
  LOG_LEVEL: "INFO"
  AUTH_ENABLED: "true"
  TRUST_PROXY_HEADERS: "true"
  PYTHONUNBUFFERED: "1"
